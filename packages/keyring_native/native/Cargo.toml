[package]
name = "keyring-dart-native"
version = "1.0.0"
description = "Rust FFI wrapper for keyring ecosystem native stores"
edition = "2024"
rust-version = "1.88"

[lib]
crate-type = ["staticlib", "cdylib"]

[dependencies]
keyring-core = { path = "../../../third_party/keyring-core" }
libc = "0.2"
serde_json = "1"
serde = "1"
log = "0.4"

# Linux kernel keyring (fallback when no Secret Service)
linux-keyutils-keyring-store = { path = "../../../third_party/linux-keyutils-keyring-store" }

# Windows Credential Manager
windows-native-keyring-store = { path = "../../../third_party/windows-native-keyring-store", features = ["search"] }

# D-Bus Secret Service via zbus (primary *nix backend)
zbus-secret-service-keyring-store = { path = "../../../third_party/zbus-secret-service-keyring-store", features = ["crypto-rust"] }

# D-Bus Secret Service via libdbus (alternative *nix backend)
dbus-secret-service-keyring-store = { path = "../../../third_party/dbus-secret-service-keyring-store", features = ["crypto-rust", "vendored"] }

# macOS Keychain / iOS Protected Data
apple-native-keyring-store = { version = "0.1", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { version = "0.1" }

[target.'cfg(target_os = "ios")'.dependencies]
apple-native-keyring-store = { version = "0.1" }

[build-dependencies]
cbindgen = "0.29.0"

[patch.crates-io]
keyring-core = { path = "../../../third_party/keyring-core" }
zbus-secret-service-keyring-store = { path = "../../../third_party/zbus-secret-service-keyring-store" }
dbus-secret-service-keyring-store = { path = "../../../third_party/dbus-secret-service-keyring-store" }
linux-keyutils-keyring-store = { path = "../../../third_party/linux-keyutils-keyring-store" }
windows-native-keyring-store = { path = "../../../third_party/windows-native-keyring-store" }
